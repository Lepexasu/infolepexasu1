<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lepexasu | Info</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-color: #050505;
            --accent-white: #ffffff;
            --gray: #444;
            --pixel-font: 'Press Start 2P', cursive;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes blinker { 50% { opacity: 0; } }
        .blink { animation: blinker 1s linear infinite; }

        * {
            font-family: var(--pixel-font) !important;
            image-rendering: pixelated;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(0deg, rgba(255, 255, 255, 0.03) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 2px, transparent 2px);
            background-size: 40px 40px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 550px;
        }

        .photo-row {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .side-photo {
            flex: 1;
            width: 50%;
            height: 200px;
            object-fit: cover;
            border: 4px double var(--accent-white);
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            animation: fadeIn 1s ease-out;
            filter: grayscale(100%);
            transition: 0.3s;
        }

        .side-photo:hover {
            filter: grayscale(0%);
            transform: scale(1.02);
        }

        .card {
            background: rgba(0, 0, 0, 0.95);
            border: 4px double var(--accent-white);
            padding: 30px;
            text-align: center;
            box-shadow: 10px 10px 0px rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease-out;
            width: 100%;
        }

        h1 {
            font-size: 1.1rem;
            color: var(--accent-white);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin: 0 0 30px 0;
        }

        .info-block { text-align: left; margin-bottom: 20px; }

        .data-item {
            border-left: 4px solid var(--accent-white);
            padding: 10px 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .data-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .label { color: var(--gray); font-size: 0.5rem; display: block; margin-bottom: 5px; }
        .value { font-size: 0.65rem; color: #eee; }

        .social-block { display: flex; flex-direction: column; gap: 10px; }

        .link-btn {
            display: block;
            padding: 12px;
            border: 2px solid var(--accent-white);
            color: var(--accent-white);
            text-decoration: none;
            font-size: 0.55rem;
            text-align: center;
            transition: 0.3s;
        }

        .link-btn:hover {
            background: var(--accent-white);
            color: #000;
            box-shadow: 0 0 15px var(--accent-white);
        }

        .disconnect-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            border: 2px solid #333;
            color: #333;
            text-decoration: none;
            font-size: 0.55rem;
            cursor: pointer;
            transition: 0.3s;
            background: none;
        }

        .disconnect-btn:hover {
            border-color: #fff;
            color: #fff;
        }
.data-item {
    overflow: visible;
}

.value {
    display: block;
    transition: 0.3s ease-in-out;
    transform-origin: left center;
}

.data-item:hover .value {
    transform: scale(1.3);
    color: var(--accent-white);
    z-index: 10;
    position: relative;
}

    </style>
</head>
<body>

    <div class="main-container">
        <div class="photo-row">
            <img src="https://i.ibb.co/qMNv1CXf/photo-2026-04-09-17-59-45.jpg" class="side-photo" alt="Photo 1">
            <img src="https://i.ibb.co/SXZ2bGKQ/photo-2026-04-09-17-59-12.jpg" class="side-photo" alt="Photo 2">
        </div>

        <div class="card">
            <h1>INFORMATION<span class="blink">_</span></h1>
            
            <div class="info-block">
                <div class="data-item">
                    <span class="label">[ NAME ]</span>
                    <span class="value">Lepexasu</span>
                </div>
                <div class="data-item">
                    <span class="label">[ AGE ]</span>
                    <span class="value">16 Years</span>
                </div>
                <div class="data-item">
                    <span class="label">[ DATE OF BIRTH ]</span>
                    <span class="value">14.04.XXXX</span>
                </div>
            </div>

            <div class="social-block">
                <a href="https://t.me/Lepexasu_bot" target="_blank" class="link-btn">SPAMBLOCK</a>
                <a href="https://steamcommunity.com/profiles/76561199790693513/" target="_blank" class="link-btn">STEAM</a>
                <a href="https://www.tiktok.com/@lepexus21?_r=1&_t=ZS-95NIiv7TLQ8" target="_blank" class="link-btn">TIKTOK</a>
            </div>

            <button class="disconnect-btn" onclick="location.href='https://lepexasu.github.io/biolepexasu.github.io/'">DISCONNECT</button>
        </div>
    </div>

</body>
</html>

</html>
